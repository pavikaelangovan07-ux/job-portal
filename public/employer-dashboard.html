<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Employer dashboard — Fieldnote</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">field<span>note</span></a>
    <nav class="main-nav">
      <a href="index.html">Find jobs</a>
      <a href="post-job.html">Post a job</a>
    </nav>
    <div id="nav-user-slot"></div>
  </div>
</header>

<div class="container">
  <div class="dash-header">
    <h1>Your postings</h1>
    <p>Manage jobs and review who's applied.</p>
  </div>

  <div id="gate"></div>

  <div id="dashboard-content" class="dash-grid two-col" style="display:none">
    <div class="card">
      <h3 style="margin-top:0">Open roles</h3>
      <div id="job-list"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0" id="applicants-title">Applicants</h3>
      <div id="applicants-list">
        <p style="color:var(--ink-soft);font-size:14px">Select a job on the left to see its applicants.</p>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/dashboards.js"></script>
</body>
</html>
