<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — Fieldnote</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">field<span>note</span></a>
    <nav class="main-nav">
      <a href="index.html">Find jobs</a>
      <a href="post-job.html">Post a job</a>
    </nav>
    <div id="nav-user-slot"></div>
  </div>
</header>

<div class="form-card">
  <h1>Welcome back</h1>
  <p class="sub">Log in to manage your jobs or applications.</p>
  <form id="login-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" required />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Log in</button>
    <p id="msg" class="form-msg"></p>
  </form>
  <p class="form-foot">New here? <a href="register.html" style="color:var(--brand);font-weight:600">Create an account</a></p>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = 'form-msg';
  try {
    const data = await apiRequest('/auth/login', {
      method: 'POST',
      body: {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      },
    });
    Auth.setSession(data.token, data.user);
    window.location.href = data.user.role === 'employer' ? 'employer-dashboard.html' : 'seeker-dashboard.html';
  } catch (err) {
    msg.textContent = err.message;
    msg.classList.add('error');
  }
});
</script>
</body>
</html>
